<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA REGENERADOR - PULSO WINTER</title>
    <style>
        body {
            background-color: #050505;
            color: #E0E0E0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .panel-control {
            margin: 40px auto;
            max-width: 500px;
            padding: 30px;
            border: 3px solid #1ABC9C;
            border-radius: 30px;
            background-color: #0F0F0F;
            box-shadow: 0 0 20px rgba(26, 188, 156, 0.3);
        }
        .btn {
            width: 80%;
            padding: 25px;
            font-size: 1.6em;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 15px 0;
            text-transform: uppercase;
        }
        .btn-play { background-color: #1ABC9C; color: white; }
        .btn-stop { background-color: #C0392B; color: white; }
        .status-box {
            font-size: 1.2em;
            margin-top: 20px;
            color: #1ABC9C;
        }
    </style>
</head>
<body>

    <h1>SISTEMA MÓNICA: PULSO ARMÓNICO</h1>
    <p>BASADO EN LA LEY DE WINTER ($1.618$)</p>

    <div class="panel-control">
        <button class="btn btn-play" onclick="iniciarExperiencia()">INICIAR PULSO WINTER</button>
        <button class="btn btn-stop" onclick="pararExperiencia()">DETENER SISTEMA</button>
        
        <div class="status-box">
            ESTADO: <span id="label-estado">EN REPOSO</span><br>
            RITMO: <span id="label-ritmo">ESPERANDO...</span>
        </div>
    </div>

    <script>
        let wakeLock = null;
        let audioCtx = null;
        let oscilador = null;
        let ganancia = null;
        let activo = false;
        const PHI = 1.618; // LA CONSTANTE DE WINTER

        async function iniciarExperiencia() {
            if (activo) return;
            activo = true;

            try {
                // ACTIVAR WAKELOCK PARA PERSISTENCIA TOTAL
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscilador = audioCtx.createOscillator();
                ganancia = audioCtx.createGain();

                oscilador.type = 'sine';
                oscilador.frequency.setValueAtTime(432, audioCtx.currentTime); 
                
                ganancia.connect(audioCtx.destination);
                oscilador.connect(ganancia);
                oscilador.start();

                document.getElementById('label-estado').innerText = "CONECTADO AL ESTERNÓN";
                document.getElementById('label-ritmo').innerText = "PULSO PHI ACTIVO";

                ejecutarCicloWinter();
            } catch (e) {
                alert("Por favor, toque la pantalla para activar el audio.");
                activo = false;
            }
        }

        function ejecutarCicloWinter() {
            if (!activo) return;

            const ahora = audioCtx.currentTime;
            const duracionPulso = PHI; // Duración en segundos basada en Winter

            // MODULACIÓN DE SONIDO (Crescendo y Diminuendo armónico)
            ganancia.gain.cancelScheduledValues(ahora);
            ganancia.gain.setValueAtTime(0.02, ahora);
            ganancia.gain.exponentialRampToValueAtTime(0.15, ahora + (duracionPulso / 2));
            ganancia.gain.exponentialRampToValueAtTime(0.02, ahora + duracionPulso);

            // VIBRACIÓN SINCRONIZADA (Pulso táctil Winter)
            if (navigator.vibrate) {
                // Vibra más fuerte en el pico de la frecuencia
                setTimeout(() => {
                    if (activo) navigator.vibrate([200, 100, 200]); 
                }, (duracionPulso / 2) * 1000);
            }

            // REPETICIÓN DEL CICLO REGENERADOR
            setTimeout(ejecutarCicloWinter, duracionPulso * 1000);
        }

        function pararExperiencia() {
            activo = false;
            if (oscilador) {
                oscilador.stop();
                oscilador.disconnect();
            }
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            document.getElementById('label-estado').innerText = "SISTEMA DETENIDO";
            document.getElementById('label-ritmo').innerText = "ESPERANDO...";
            console.log("REGISTRO: Sesión terminada. Datos guardados en memoria.");
        }
    </script>
</body>
</html>
