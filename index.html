<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ARMÓNICO - CONTROL TOTAL</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .contenedor-botones {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .btn {
            padding: 25px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-iniciar { background-color: #2ECC71; color: white; }
        .btn-parar { background-color: #E74C3C; color: white; }
        .btn:active { transform: scale(0.95); }
        
        #panel-estado {
            margin-top: 40px;
            border: 2px solid #3498DB;
            padding: 20px;
            border-radius: 20px;
            background-color: #1A1A1A;
        }
        .lectura { font-size: 1.2em; margin: 15px 0; color: #BDC3C7; }
        .resaltado { color: #3498DB; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SISTEMA PARA MÓNICA</h1>
    <p>SINTONÍA FINA Y REGENERACIÓN</p>

    <div class="contenedor-botones">
        <button class="btn btn-iniciar" onclick="iniciarExperiencia()">INICIAR EXPERIENCIA</button>
        <button class="btn btn-parar" onclick="pararExperiencia()">PARAR TODO</button>
    </div>

    <div id="panel-estado">
        <div class="lectura">SISTEMA: <span id="status" class="resaltado">ESPERANDO...</span></div>
        <div class="lectura">ESTERNÓN: <span id="vibracion-val" class="resaltado">REPOSO</span></div>
        <div class="lectura">CALOR ARMÓNICO: <span id="calor-val" class="resaltado">ESTABLE</span></div>
    </div>

    <script>
        let wakeLock = null;
        let oscilador = null;
        let audioCtx = null;
        let intervaloVibracion = null;

        async function iniciarExperiencia() {
            try {
                // ACTIVAR WAKELOCK (PANTALLA SIEMPRE ACTIVA)
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
                
                // INICIAR AUDIO (OSCILOSCOPIO SÓNICO)
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscilador = audioCtx.createOscillator();
                let ganancia = audioCtx.createGain();
                
                oscilador.type = 'sine';
                oscilador.frequency.setValueAtTime(432, audioCtx.currentTime); // Frecuencia Armónica
                ganancia.gain.setValueAtTime(0.1, audioCtx.currentTime);
                
                oscilador.connect(ganancia);
                ganancia.connect(audioCtx.destination);
                oscilador.start();

                // INICIAR VIBRACIÓN LEY DE WINTER
                intervaloVibracion = setInterval(() => {
                    if (navigator.vibrate) { navigator.vibrate([60, 40, 60]); }
                }, 1200);

                document.getElementById('status').innerText = "EN EJECUCIÓN";
                document.getElementById('status').style.color = "#2ECC71";
                document.getElementById('vibracion-val').innerText = "RESONANDO EN PECHO";
                
                console.log("REGISTRO: Experiencia iniciada correctamente.");
            } catch (e) {
                alert("Por favor, interactúa con la pantalla primero.");
            }
        }

        function pararExperiencia() {
            // DETENER AUDIO
            if (oscilador) {
                oscilador.stop();
                oscilador.disconnect();
            }
            
            // DETENER VIBRACIÓN
            if (intervaloVibracion) {
                clearInterval(intervaloVibracion);
            }
            
            // LIBERAR WAKELOCK
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }

            document.getElementById('status').innerText = "SISTEMA DETENIDO";
            document.getElementById('status').style.color = "#E74C3C";
            document.getElementById('vibracion-val').innerText = "REPOSO";
            
            console.log("REGISTRO: Experiencia detenida por el usuario.");
        }
    </script>
</body>
</html>
