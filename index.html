<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA REGENERADOR SENSORIAL - LEY DE WINTER</title>
    <style>
        body {
            background-color: #000000;
            color: #1ABC9C;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .boton-grande {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 5px solid #1ABC9C;
            background: #0A0A0A;
            color: #1ABC9C;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(26, 188, 156, 0.2);
            margin: 20px auto;
        }
        .instruccion { font-size: 1.2em; opacity: 0.7; }
    </style>
</head>
<body>

    <p class="instruccion">EXPERIENCIA SENSORIAL PARA EL ESTERNÓN</p>
    <button id="mainButton" class="boton-grande" onclick="gestionarSistema()">INICIAR</button>
    <p id="info-estado">SISTEMA LISTO</p>

    <script>
        let activo = false;
        let audioCtx, oscilador, ganancia, wakeLock;
        let datosSesion = [];
        const PHI = 1.618;

        // SÍNTESIS DE VOZ PARA INTERFAZ NO VISUAL
        function hablar(mensaje) {
            const voz = new SpeechSynthesisUtterance(mensaje);
            voz.lang = 'es-ES';
            voz.rate = 0.85;
            window.speechSynthesis.speak(voz);
        }

        // REGISTRO DE MEMORIA SIN ABREVIACIONES
        function registrar(evento) {
            const marcaDeTiempo = new Date().toLocaleTimeString();
            datosSesion.push(`[${marcaDeTiempo}] ${evento}`);
            console.log(evento);
        }

        async function gestionarSistema() {
            if (!activo) {
                await iniciar();
            } else {
                finalizarYGuardar();
            }
        }

        async function iniciar() {
            activo = true;
            document.getElementById('mainButton').innerText = "DETENER";
            document.getElementById('mainButton').style.borderColor = "#E74C3C";
            
            hablar("Iniciando sistema armónico. Coloca el celular sobre el esternón de Mónica.");
            registrar("Inicio de sesión bajo la Ley de Winter.");

            try {
                // WAKELOCK PARA MANTENER SENSORES Y PANTALLA SIEMPRE ACTIVOS
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscilador = audioCtx.createOscillator();
                ganancia = audioCtx.createGain();

                oscilador.type = 'sine';
                oscilador.frequency.setValueAtTime(432, audioCtx.currentTime);
                ganancia.connect(audioCtx.destination);
                oscilador.connect(ganancia);
                oscilador.start();

                cicloResonanciaWinter();
                iniciarSensores();
            } catch (error) {
                registrar("Error al iniciar: " + error);
            }
        }

        function cicloResonanciaWinter() {
            if (!activo) return;

            const ahora = audioCtx.currentTime;
            
            // BARRIDO DE RESONANCIA (428Hz a 436Hz)
            oscilador.frequency.exponentialRampToValueAtTime(436, ahora + (PHI / 2));
            oscilador.frequency.exponentialRampToValueAtTime(428, ahora + PHI);

            // PULSO DE VOLUMEN (RESPIRACIÓN)
            ganancia.gain.cancelScheduledValues(ahora);
            ganancia.gain.setValueAtTime(0.02, ahora);
            ganancia.gain.exponentialRampToValueAtTime(0.18, ahora + (PHI / 2));
            ganancia.gain.exponentialRampToValueAtTime(0.02, ahora + PHI);

            // VIBRACIÓN ARMÓNICA (TACTO)
            if (navigator.vibrate) {
                navigator.vibrate([150, 100, 150]);
            }

            setTimeout(cicloResonanciaWinter, PHI * 1000);
        }

        function iniciarSensores() {
            window.addEventListener('devicemotion', (event) => {
                if (!activo) return;
                const movimiento = event.accelerationIncludingGravity.z;
                // SI EL MOVIMIENTO ES ESTABLE, REGISTRAMOS LA ARMONÍA
                if (Math.abs(movimiento) > 9.5) {
                    registrar("Contacto estable detectado en el pecho.");
                }
            });
        }

        function finalizarYGuardar() {
            activo = false;
            hablar("Sesión finalizada. Generando memoria de datos.");
            
            if (oscilador) {
                oscilador.stop();
                oscilador.disconnect();
            }
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }

            // CREACIÓN DEL ARCHIVO DE MEMORIA TXT
            const contenido = "INFORME REGENERADOR - LEY DE WINTER\n" +
                              "====================================\n\n" +
                              datosSesion.join("\n");
            
            const blob = new Blob([contenido], { type: 'text/plain' });
            const enlace = document.createElement('a');
            enlace.href = URL.createObjectURL(blob);
            enlace.download = `Memoria_Winter_${new Date().getTime()}.txt`;
            enlace.click();

            document.getElementById('mainButton').innerText = "REINICIAR";
            document.getElementById('mainButton').style.borderColor = "#1ABC9C";
            registrar("Memoria descargada correctamente.");
        }
    </script>
</body>
</html>
