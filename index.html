<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WINTER · REGISTRO COMPLETO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a120a;
            color: #b0ffb0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px #2a8;
            margin: 10px 0;
        }
        .tiempo {
            font-size: 5rem;
            font-weight: bold;
            font-family: monospace;
            background: #1a2a1a;
            padding: 30px 20px;
            border-radius: 60px;
            border: 3px solid #3a8;
            margin: 20px 0;
            box-shadow: 0 0 30px #1a4a1a;
        }
        .boton-grande {
            background: #3a6a3a;
            border: 3px solid #8f8;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 25px 0;
            border-radius: 80px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a3a1a;
            margin: 20px 0;
            transition: 0.05s;
        }
        .boton-grande.activo {
            background: #6a3a3a;
            border-color: #f88;
            box-shadow: 0 8px 0 #3a1a1a;
        }
        .boton-grande:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        .indicadores {
            background: #1a2a1a;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #3a8;
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
        }
        .valor {
            color: #8f8;
            font-weight: bold;
        }
        .cardiaco { color: #ff88aa; }
        .armonia {
            background: #2a4a2a;
            border-color: #8f8;
            color: #8f8;
        }
        .alerta { 
            background: #3a2a2a;
            border-color: #f88;
            color: #faa;
            display: none;
        }
        footer {
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 WINTER · REGISTRO</h1>
        
        <div class="tiempo" id="cuentaAtras">21:00</div>
        
        <div class="boton-grande" id="btnIniciar">INICIAR</div>
        
        <div class="indicadores">
            <span>❤️ <span id="valorBPM" class="valor">--</span></span>
            <span>🌬️ <span id="valorRPM" class="valor">--</span></span>
            <span>⚖️ <span id="valorZ" class="valor">0.0</span></span>
        </div>
        
        <div class="indicadores armonia" id="indicadorArmonia" style="display:none;">
            ✨ ESTADO DE ARMONÍA ✨
        </div>
        
        <div class="indicadores alerta" id="alertaDespegue">
            ⚠️ COLOCA EL CELULAR SOBRE EL PECHO
        </div>
        
        <footer>
            Apoya sobre el esternón · Al alcanzar la armonía sonará un tono
        </footer>
    </div>

    <script>
        // ===========================================
        // CONSTANTES
        // ===========================================
        const PHI = 1.618033988749895;
        const FRECUENCIA_BASE = 40; // Hz
        const DURACION_SESION = 21 * 60; // 21 minutos
        const INTERVALO_PULSO = 50; // ms
        const INTERVALO_REGISTRO = 1000; // 1 segundo para guardar datos

        // ===========================================
        // ESTADO
        // ===========================================
        let sistemaActivo = false;
        let tiempoRestante = DURACION_SESION;
        let tiempoInicio = 0;
        let wakeLock = null;
        let audioCtx = null;
        let oscilador = null;
        let ganancia = null;
        
        // Sensores
        let ultimoX = 0, ultimoY = 0, ultimoZ = 0;
        let bufferZ = [];
        let bufferBPM = [];
        let ultimoPicoTiempo = 0;
        let intervalosRR = [];
        let bpmActual = 0;
        let rpmActual = 0;
        let enAlerta = false;
        let armoniaActiva = false;
        let contadorArmonia = 0; // para requerir varios segundos consecutivos

        // Registro de datos para CSV
        let registros = [];
        let intervaloRegistro = null;

        // Elementos DOM
        const cuentaAtrasEl = document.getElementById('cuentaAtras');
        const btnIniciar = document.getElementById('btnIniciar');
        const valorBPM = document.getElementById('valorBPM');
        const valorRPM = document.getElementById('valorRPM');
        const valorZ = document.getElementById('valorZ');
        const indicadorArmonia = document.getElementById('indicadorArmonia');
        const alertaDespegue = document.getElementById('alertaDespegue');

        // ===========================================
        // FUNCIONES DE TIEMPO
        // ===========================================
        function formatearTiempo(s) {
            const m = Math.floor(s / 60);
            const seg = s % 60;
            return `${m.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
        }

        // ===========================================
        // WAKE LOCK
        // ===========================================
        async function activarWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {}
            }
        }

        function liberarWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // ===========================================
        // SONIDO DE ARMONÍA (ding)
        // ===========================================
        function sonidoArmonia() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880; // nota LA, agradable
            gain.gain.value = 0.2;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15); // 150 ms
        }

        // ===========================================
        // SENSORES
        // ===========================================
        function iniciarSensores() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', (event) => {
                    const acc = event.accelerationIncludingGravity;
                    if (acc) {
                        ultimoX = acc.x || 0;
                        ultimoY = acc.y || 0;
                        ultimoZ = acc.z || 0;
                        valorZ.innerText = ultimoZ.toFixed(1);

                        // Detectar despegue
                        if (sistemaActivo) {
                            const nuevaAlerta = (ultimoZ < 5.0 || ultimoZ > 15.0);
                            if (nuevaAlerta && !enAlerta) {
                                enAlerta = true;
                                alertaDespegue.style.display = 'flex';
                            } else if (!nuevaAlerta && enAlerta) {
                                enAlerta = false;
                                alertaDespegue.style.display = 'none';
                            }
                        }

                        // Guardar para análisis
                        bufferZ.push({ valor: ultimoZ, tiempo: Date.now() });
                        if (bufferZ.length > 300) bufferZ.shift();
                    }
                });
            }
        }

        // Análisis de BPM y RPM (cada 2 segundos)
        function iniciarAnalisis() {
            setInterval(() => {
                if (!sistemaActivo) return;

                const ahora = Date.now();
                const ventana = bufferZ.filter(d => ahora - d.tiempo < 30000);
                if (ventana.length < 50) return;

                const valores = ventana.map(d => d.valor);
                
                // --- RPM (respiración) ---
                let picosResp = 0;
                for (let i = 2; i < valores.length - 2; i++) {
                    if (valores[i] > valores[i-1] && valores[i] > valores[i-2] &&
                        valores[i] > valores[i+1] && valores[i] > valores[i+2]) {
                        picosResp++;
                    }
                }
                const duracionMin = (ahora - ventana[0].tiempo) / 60000;
                rpmActual = duracionMin > 0 ? Math.round(picosResp / duracionMin) : 12;
                valorRPM.innerText = rpmActual;

                // --- BPM (cardíaco) con filtro pasa altas ---
                const mediaMovil = [];
                for (let i = 0; i < valores.length; i++) {
                    let suma = 0, count = 0;
                    for (let j = Math.max(0, i-5); j < Math.min(valores.length, i+5); j++) {
                        suma += valores[j];
                        count++;
                    }
                    mediaMovil.push(suma / count);
                }

                const filtrada = [];
                for (let i = 0; i < valores.length; i++) {
                    filtrada.push(valores[i] - mediaMovil[i]);
                }

                let picosCard = 0;
                const umbral = 0.02;
                for (let i = 2; i < filtrada.length - 2; i++) {
                    if (filtrada[i] > umbral && 
                        filtrada[i] > filtrada[i-1] && filtrada[i] > filtrada[i-2] &&
                        filtrada[i] > filtrada[i+1] && filtrada[i] > filtrada[i+2]) {
                        picosCard++;
                    }
                }
                const bpmEstimado = Math.round(picosCard / duracionMin);
                if (bpmEstimado > 40 && bpmEstimado < 150) {
                    bpmActual = bpmEstimado;
                    valorBPM.innerText = bpmActual;
                }
            }, 2000);
        }

        // ===========================================
        // DETECCIÓN DE ARMONÍA
        // ===========================================
        function evaluarArmonia() {
            if (!sistemaActivo) return false;

            // Criterios de armonía: frecuencia cardíaca entre 50-70, respiración entre 6-12, y poca variación en Z
            const bpmOk = bpmActual >= 50 && bpmActual <= 70;
            const rpmOk = rpmActual >= 6 && rpmActual <= 12;
            
            // Calcular varianza de Z en los últimos 10 segundos
            const ahora = Date.now();
            const ventanaZ = bufferZ.filter(d => ahora - d.tiempo < 10000);
            let varianza = 0;
            if (ventanaZ.length > 10) {
                const media = ventanaZ.reduce((a, b) => a + b.valor, 0) / ventanaZ.length;
                const suma = ventanaZ.reduce((a, b) => a + Math.pow(b.valor - media, 2), 0);
                varianza = suma / ventanaZ.length;
            }
            const estabilidadOk = varianza < 0.1; // poca agitación

            return bpmOk && rpmOk && estabilidadOk;
        }

        // ===========================================
        // AUDIO CON PULSO ÁUREO
        // ===========================================
        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            oscilador = audioCtx.createOscillator();
            ganancia = audioCtx.createGain();
            
            oscilador.type = 'sine';
            oscilador.frequency.value = FRECUENCIA_BASE;
            
            oscilador.connect(ganancia);
            ganancia.connect(audioCtx.destination);
            oscilador.start();

            const inicioMod = Date.now();
            const intervaloMod = setInterval(() => {
                if (!sistemaActivo) {
                    clearInterval(intervaloMod);
                    return;
                }

                const t = (Date.now() - inicioMod) / 1000;
                const ciclo = PHI;
                const fase = (t % ciclo) / ciclo;

                // Pulso logarítmico
                let amplitud = Math.exp(-fase * 8);
                amplitud = 0.05 + amplitud * 0.45;
                ganancia.gain.value = amplitud;

                // Vibración en el pico del pulso
                if (fase < 0.1 && navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }, INTERVALO_PULSO);

            return intervaloMod;
        }

        // ===========================================
        // REGISTRO DE DATOS (cada segundo)
        // ===========================================
        function iniciarRegistro() {
            if (intervaloRegistro) clearInterval(intervaloRegistro);
            intervaloRegistro = setInterval(() => {
                if (!sistemaActivo) return;

                const tiempoRel = (Date.now() - tiempoInicio) / 1000;
                const armonia = evaluarArmonia() ? 1 : 0;

                // Detectar flanco ascendente de armonía para sonido
                if (armonia && !armoniaActiva) {
                    armoniaActiva = true;
                    contadorArmonia = 0;
                    indicadorArmonia.style.display = 'flex';
                    sonidoArmonia(); // ¡Ding!
                } else if (!armonia && armoniaActiva) {
                    armoniaActiva = false;
                    indicadorArmonia.style.display = 'none';
                }

                // Guardar registro
                registros.push({
                    t: tiempoRel.toFixed(2),
                    x: ultimoX.toFixed(3),
                    y: ultimoY.toFixed(3),
                    z: ultimoZ.toFixed(3),
                    bpm: bpmActual,
                    rpm: rpmActual,
                    armonia: armonia
                });
            }, INTERVALO_REGISTRO);
        }

        // ===========================================
        // GENERAR Y DESCARGAR CSV
        // ===========================================
        function descargarCSV() {
            if (registros.length === 0) return;

            let csv = 'tiempo,x,y,z,bpm,rpm,armonia\n';
            registros.forEach(r => {
                csv += `${r.t},${r.x},${r.y},${r.z},${r.bpm},${r.rpm},${r.armonia}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `winter_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ===========================================
        // CONTROL DE SESIÓN
        // ===========================================
        function iniciarSesion() {
            if (sistemaActivo) {
                detenerSesion();
                return;
            }

            sistemaActivo = true;
            tiempoRestante = DURACION_SESION;
            tiempoInicio = Date.now();
            registros = []; // nuevo registro para esta sesión
            armoniaActiva = false;
            contadorArmonia = 0;

            btnIniciar.innerText = 'DETENER';
            btnIniciar.classList.add('activo');

            activarWakeLock();
            iniciarSensores();
            iniciarAnalisis();

            const intervaloMod = iniciarAudio();
            iniciarRegistro();

            // Temporizador de cuenta regresiva
            const intervaloCuenta = setInterval(() => {
                if (!sistemaActivo) {
                    clearInterval(intervaloCuenta);
                    return;
                }
                tiempoRestante--;
                if (tiempoRestante <= 0) {
                    detenerSesion();
                } else {
                    cuentaAtrasEl.innerText = formatearTiempo(tiempoRestante);
                }
            }, 1000);

            window._intervaloMod = intervaloMod;
            window._intervaloCuenta = intervaloCuenta;
        }

        function detenerSesion() {
            if (!sistemaActivo) return;

            sistemaActivo = false;

            // Limpiar intervalos
            if (window._intervaloMod) clearInterval(window._intervaloMod);
            if (window._intervaloCuenta) clearInterval(window._intervaloCuenta);
            if (intervaloRegistro) clearInterval(intervaloRegistro);

            // Detener audio
            if (oscilador) {
                oscilador.stop();
                oscilador = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }

            liberarWakeLock();
            navigator.vibrate(0);

            // Descargar CSV automáticamente
            descargarCSV();

            // Restaurar UI
            btnIniciar.innerText = 'INICIAR';
            btnIniciar.classList.remove('activo');
            cuentaAtrasEl.innerText = formatearTiempo(DURACION_SESION);
            alertaDespegue.style.display = 'none';
            indicadorArmonia.style.display = 'none';
            enAlerta = false;
        }

        // ===========================================
        // EVENTO DEL BOTÓN
        // ===========================================
        btnIniciar.addEventListener('click', iniciarSesion);

        // Inicializar sensores pasivamente
        iniciarSensores();
    </script>
</body>
</html>
