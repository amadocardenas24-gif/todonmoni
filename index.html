<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WINTER · PINEAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a120a; /* Verde oscuro base */
            color: #b0ffb0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background-color 1s ease;
        }
        /* Estado armónico: violeta con pulso a 8 Hz */
        body.estado-armonico {
            background: radial-gradient(circle, #2e0854, #000000);
            animation: pulsoVioleta 0.125s infinite; /* 8 Hz = 125ms ciclo */
        }
        @keyframes pulsoVioleta {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px #2a8;
            margin: 10px 0;
        }
        .tiempo {
            font-size: 5rem;
            font-weight: bold;
            font-family: monospace;
            background: #1a2a1a;
            padding: 30px 20px;
            border-radius: 60px;
            border: 3px solid #3a8;
            margin: 20px 0;
            box-shadow: 0 0 30px #1a4a1a;
            transition: all 0.5s;
        }
        body.estado-armonico .tiempo {
            background: #2a1a3a;
            border-color: #a56eff;
            color: #e0b0ff;
            box-shadow: 0 0 30px #6a2a8a;
        }
        .boton-grande {
            background: #3a6a3a;
            border: 3px solid #8f8;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 25px 0;
            border-radius: 80px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a3a1a;
            margin: 20px 0;
            transition: 0.05s;
        }
        .boton-grande.activo {
            background: #6a3a3a;
            border-color: #f88;
            box-shadow: 0 8px 0 #3a1a1a;
        }
        .boton-grande:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        .indicadores {
            background: #1a2a1a;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #3a8;
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            transition: all 0.5s;
        }
        body.estado-armonico .indicadores {
            background: #2a1a3a;
            border-color: #a56eff;
            color: #e0b0ff;
        }
        .valor {
            color: #8f8;
            font-weight: bold;
        }
        body.estado-armonico .valor {
            color: #d8a0ff;
        }
        .cardiaco { color: #ff88aa; }
        .barra-z {
            background: #1a2a1a;
            border-radius: 20px;
            height: 30px;
            margin: 10px 0;
            border: 2px solid #3a8;
            overflow: hidden;
            transition: all 0.5s;
        }
        body.estado-armonico .barra-z {
            border-color: #a56eff;
        }
        .nivel-z {
            width: 50%;
            height: 100%;
            background: #4a8;
            transition: width 0.2s, background 0.5s;
        }
        body.estado-armonico .nivel-z {
            background: #b07cff;
        }
        .alerta { 
            background: #3a2a2a;
            border-color: #f88;
            color: #faa;
            display: none;
        }
        footer {
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 WINTER · PINEAL</h1>
        
        <div class="tiempo" id="cuentaAtras">21:00</div>
        
        <div class="boton-grande" id="btnIniciar">INICIAR</div>
        
        <div class="indicadores">
            <span>❤️ <span id="valorBPM" class="valor">--</span></span>
            <span>🌬️ <span id="valorRPM" class="valor">--</span></span>
            <span>⚖️ <span id="valorZ" class="valor">0.0</span></span>
        </div>
        
        <!-- Manómetro de silencio (barra Z) -->
        <div class="barra-z">
            <div class="nivel-z" id="barraZ" style="width:50%"></div>
        </div>
        
        <div class="indicadores armonia" id="indicadorArmonia" style="display:none;">
            ✨ ACTIVACIÓN PINEAL ✨
        </div>
        
        <div class="indicadores alerta" id="alertaDespegue">
            ⚠️ COLOCA EL CELULAR SOBRE EL PECHO
        </div>
        
        <footer>
            Apoya sobre el esternón · El violeta aparece con la calma total
        </footer>
    </div>

    <script>
        // ===========================================
        // CONSTANTES
        // ===========================================
        const PHI = 1.618033988749895;
        const FRECUENCIA_BINAURAL_RELAJACION = 40; // Hz
        const FREC_IZQ_RELAJACION = 200;
        const FREC_DER_RELAJACION = 160;
        
        const FREC_IZQ_PINEAL = 436;
        const FREC_DER_PINEAL = 428; // Diferencia 8 Hz (Resonancia Schumann)
        
        const DURACION_SESION = 21 * 60; // 21 minutos
        const INTERVALO_PULSO = 50; // ms
        const INTERVALO_REGISTRO = 1000; // 1 segundo
        const UMBRAL_RPM_ARMONIA = 10; // rpm menor que 10
        const UMBRAL_VARIANZA_ARMONIA = 0.03; // varianza de Z muy baja
        const Z_IDEAL = -9.8; // punto de apoyo perfecto (gravedad)
        const TOLERANCIA_Z = 0.5; // desviación permitida antes de alertar

        // ===========================================
        // ESTADO
        // ===========================================
        let sistemaActivo = false;
        let tiempoRestante = DURACION_SESION;
        let tiempoInicio = 0;
        let wakeLock = null;
        let audioCtx = null;
        let oscIzq = null, oscDer = null;
        let gananciaIzq = null, gananciaDer = null;
        let merger = null;
        
        // Estado de audio actual
        let modoPinealActivo = false; // true cuando estamos en violeta
        
        // Para transición suave de frecuencias
        let targetFreqIzq = FREC_IZQ_RELAJACION;
        let targetFreqDer = FREC_DER_RELAJACION;
        let intervaloTransicion = null;
        
        // Sensores
        let ultimoX = 0, ultimoY = 0, ultimoZ = 0;
        let bufferZ = [];
        let bpmActual = 0;
        let rpmActual = 0;
        let varianzaZ = 0;
        let enAlerta = false;
        let armoniaActiva = false; // coincide con el violeta

        // Registro CSV
        let registros = [];
        let intervaloRegistro = null;

        // Elementos DOM
        const cuentaAtrasEl = document.getElementById('cuentaAtras');
        const btnIniciar = document.getElementById('btnIniciar');
        const valorBPM = document.getElementById('valorBPM');
        const valorRPM = document.getElementById('valorRPM');
        const valorZ = document.getElementById('valorZ');
        const barraZ = document.getElementById('barraZ');
        const indicadorArmonia = document.getElementById('indicadorArmonia');
        const alertaDespegue = document.getElementById('alertaDespegue');
        const bodyEl = document.body;

        // ===========================================
        // FUNCIONES DE TIEMPO
        // ===========================================
        function formatearTiempo(s) {
            const m = Math.floor(s / 60);
            const seg = s % 60;
            return `${m.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
        }

        // ===========================================
        // WAKE LOCK
        // ===========================================
        async function activarWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {}
            }
        }

        function liberarWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // ===========================================
        // SONIDOS DE FEEDBACK
        // ===========================================
        function sonidoGota() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 600; // frecuencia de gota
            gain.gain.value = 0.1;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // ===========================================
        // SENSORES
        // ===========================================
        function iniciarSensores() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', (event) => {
                    const acc = event.accelerationIncludingGravity;
                    if (acc) {
                        ultimoX = acc.x || 0;
                        ultimoY = acc.y || 0;
                        ultimoZ = acc.z || 0;
                        valorZ.innerText = ultimoZ.toFixed(1);
                        
                        // Actualizar barra de silencio (centro en -9.8)
                        let porcentaje = ((ultimoZ + 10.3) / 1.0) * 100; // mapeo aproximado
                        porcentaje = Math.max(0, Math.min(100, porcentaje));
                        barraZ.style.width = porcentaje + '%';

                        // Alerta de reubicación (solo si estamos activos y no en violeta)
                        if (sistemaActivo && !armoniaActiva) {
                            const desviacion = Math.abs(ultimoZ - Z_IDEAL);
                            if (desviacion > TOLERANCIA_Z) {
                                // Vibración corta o sonido de gota
                                if (navigator.vibrate) {
                                    navigator.vibrate(30);
                                } else {
                                    sonidoGota();
                                }
                            }
                        }

                        // Detectar despegue extremo
                        if (sistemaActivo) {
                            const nuevaAlerta = (ultimoZ < 5.0 || ultimoZ > 15.0);
                            if (nuevaAlerta && !enAlerta) {
                                enAlerta = true;
                                alertaDespegue.style.display = 'flex';
                            } else if (!nuevaAlerta && enAlerta) {
                                enAlerta = false;
                                alertaDespegue.style.display = 'none';
                            }
                        }

                        // Guardar para análisis
                        bufferZ.push({ valor: ultimoZ, tiempo: Date.now() });
                        if (bufferZ.length > 300) bufferZ.shift();
                    }
                });
            }
        }

        // Análisis de BPM, RPM y varianza (cada 2 segundos)
        function iniciarAnalisis() {
            setInterval(() => {
                if (!sistemaActivo) return;

                const ahora = Date.now();
                const ventana = bufferZ.filter(d => ahora - d.tiempo < 30000);
                if (ventana.length < 50) return;

                const valores = ventana.map(d => d.valor);
                
                // RPM (respiración)
                let picosResp = 0;
                for (let i = 2; i < valores.length - 2; i++) {
                    if (valores[i] > valores[i-1] && valores[i] > valores[i-2] &&
                        valores[i] > valores[i+1] && valores[i] > valores[i+2]) {
                        picosResp++;
                    }
                }
                const duracionMin = (ahora - ventana[0].tiempo) / 60000;
                rpmActual = duracionMin > 0 ? Math.round(picosResp / duracionMin) : 12;
                valorRPM.innerText = rpmActual;

                // Varianza de Z (estabilidad)
                const media = valores.reduce((a, b) => a + b, 0) / valores.length;
                const sumaCuadrados = valores.reduce((a, b) => a + Math.pow(b - media, 2), 0);
                varianzaZ = sumaCuadrados / valores.length;

                // BPM (cardíaco) con filtro pasa altas
                const mediaMovil = [];
                for (let i = 0; i < valores.length; i++) {
                    let suma = 0, count = 0;
                    for (let j = Math.max(0, i-5); j < Math.min(valores.length, i+5); j++) {
                        suma += valores[j];
                        count++;
                    }
                    mediaMovil.push(suma / count);
                }

                const filtrada = [];
                for (let i = 0; i < valores.length; i++) {
                    filtrada.push(valores[i] - mediaMovil[i]);
                }

                let picosCard = 0;
                const umbral = 0.02;
                for (let i = 2; i < filtrada.length - 2; i++) {
                    if (filtrada[i] > umbral && 
                        filtrada[i] > filtrada[i-1] && filtrada[i] > filtrada[i-2] &&
                        filtrada[i] > filtrada[i+1] && filtrada[i] > filtrada[i+2]) {
                        picosCard++;
                    }
                }
                const bpmEstimado = Math.round(picosCard / duracionMin);
                if (bpmEstimado > 40 && bpmEstimado < 150) {
                    bpmActual = bpmEstimado;
                    valorBPM.innerText = bpmActual;
                }

                // Evaluar armonía según los nuevos criterios estrictos
                const armonia = (rpmActual < UMBRAL_RPM_ARMONIA && varianzaZ < UMBRAL_VARIANZA_ARMONIA);
                
                if (armonia && !armoniaActiva) {
                    // Entramos en estado armónico (violeta + frecuencias pineales)
                    activarModoPineal();
                } else if (!armonia && armoniaActiva) {
                    // Salimos del estado armónico (vuelta a verde y 40 Hz)
                    desactivarModoPineal();
                }
            }, 2000);
        }

        // ===========================================
        // CAMBIO DE MODO (ARMONÍA / NO ARMONÍA)
        // ===========================================
        function activarModoPineal() {
            if (armoniaActiva) return;
            armoniaActiva = true;
            
            // Cambiar clase del body para violeta y pulso 8 Hz
            bodyEl.classList.add('estado-armonico');
            indicadorArmonia.style.display = 'flex';
            
            // Establecer frecuencias objetivo para transición
            targetFreqIzq = FREC_IZQ_PINEAL;
            targetFreqDer = FREC_DER_PINEAL;
            
            // Iniciar transición suave de 3 segundos
            if (audioCtx && oscIzq && oscDer) {
                const ahora = audioCtx.currentTime;
                oscIzq.frequency.linearRampToValueAtTime(targetFreqIzq, ahora + 3);
                oscDer.frequency.linearRampToValueAtTime(targetFreqDer, ahora + 3);
            }
        }

        function desactivarModoPineal() {
            if (!armoniaActiva) return;
            armoniaActiva = false;
            
            // Quitar clase violeta
            bodyEl.classList.remove('estado-armonico');
            indicadorArmonia.style.display = 'none';
            
            // Volver a frecuencias de relajación (40 Hz)
            targetFreqIzq = FREC_IZQ_RELAJACION;
            targetFreqDer = FREC_DER_RELAJACION;
            
            if (audioCtx && oscIzq && oscDer) {
                const ahora = audioCtx.currentTime;
                oscIzq.frequency.linearRampToValueAtTime(targetFreqIzq, ahora + 3);
                oscDer.frequency.linearRampToValueAtTime(targetFreqDer, ahora + 3);
            }
        }

        // ===========================================
        // AUDIO BINAURAL CON PULSO ÁUREO
        // ===========================================
        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Crear osciladores con frecuencias iniciales (relajación)
            oscIzq = audioCtx.createOscillator();
            oscDer = audioCtx.createOscillator();
            oscIzq.type = 'sine';
            oscDer.type = 'sine';
            oscIzq.frequency.value = FREC_IZQ_RELAJACION;
            oscDer.frequency.value = FREC_DER_RELAJACION;

            gananciaIzq = audioCtx.createGain();
            gananciaDer = audioCtx.createGain();
            gananciaIzq.gain.value = 0;
            gananciaDer.gain.value = 0;

            oscIzq.connect(gananciaIzq);
            oscDer.connect(gananciaDer);

            merger = audioCtx.createChannelMerger(2);
            gananciaIzq.connect(merger, 0, 0);
            gananciaDer.connect(merger, 0, 1);
            merger.connect(audioCtx.destination);

            oscIzq.start();
            oscDer.start();

            // Modulación de pulso común (Ley de Winter)
            const inicioMod = Date.now();
            const intervaloMod = setInterval(() => {
                if (!sistemaActivo) {
                    clearInterval(intervaloMod);
                    return;
                }

                const t = (Date.now() - inicioMod) / 1000;
                const ciclo = PHI;
                const fase = (t % ciclo) / ciclo;

                // Pulso logarítmico (ataque rápido, decaimiento lento)
                let amplitud = Math.exp(-fase * 8);
                amplitud = 0.05 + amplitud * 0.45;
                gananciaIzq.gain.value = amplitud;
                gananciaDer.gain.value = amplitud;

                // Vibración sincronizada (firma de Winter)
                // Ciclo completo = PHI segundos
                // Tiempo vibración = ciclo * 0.618, pausa = ciclo * 0.382
                // Aplicamos en cada fase < 0.618
                if (fase < 0.618 && navigator.vibrate) {
                    // vibración continua durante la fase activa
                    navigator.vibrate(50);
                }
            }, INTERVALO_PULSO);

            return intervaloMod;
        }

        // ===========================================
        // REGISTRO DE DATOS (cada segundo)
        // ===========================================
        function iniciarRegistro() {
            if (intervaloRegistro) clearInterval(intervaloRegistro);
            intervaloRegistro = setInterval(() => {
                if (!sistemaActivo) return;

                const tiempoRel = (Date.now() - tiempoInicio) / 1000;
                const armonia = armoniaActiva ? 1 : 0;

                registros.push({
                    t: tiempoRel.toFixed(2),
                    x: ultimoX.toFixed(3),
                    y: ultimoY.toFixed(3),
                    z: ultimoZ.toFixed(3),
                    bpm: bpmActual,
                    rpm: rpmActual,
                    varianza: varianzaZ.toFixed(4),
                    armonia: armonia
                });
            }, INTERVALO_REGISTRO);
        }

        // ===========================================
        // GENERAR Y DESCARGAR CSV
        // ===========================================
        function descargarCSV() {
            if (registros.length === 0) return;
            let csv = 'tiempo,x,y,z,bpm,rpm,varianza,armonia\n';
            registros.forEach(r => {
                csv += `${r.t},${r.x},${r.y},${r.z},${r.bpm},${r.rpm},${r.varianza},${r.armonia}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `winter_pineal_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ===========================================
        // CONTROL DE SESIÓN
        // ===========================================
        function iniciarSesion() {
            if (sistemaActivo) {
                detenerSesion();
                return;
            }

            sistemaActivo = true;
            tiempoRestante = DURACION_SESION;
            tiempoInicio = Date.now();
            registros = [];
            armoniaActiva = false;
            modoPinealActivo = false;

            btnIniciar.innerText = 'DETENER';
            btnIniciar.classList.add('activo');

            activarWakeLock();
            iniciarSensores();
            iniciarAnalisis();

            const intervaloMod = iniciarAudio();
            iniciarRegistro();

            const intervaloCuenta = setInterval(() => {
                if (!sistemaActivo) {
                    clearInterval(intervaloCuenta);
                    return;
                }
                tiempoRestante--;
                if (tiempoRestante <= 0) {
                    detenerSesion();
                } else {
                    cuentaAtrasEl.innerText = formatearTiempo(tiempoRestante);
                }
            }, 1000);

            window._intervaloMod = intervaloMod;
            window._intervaloCuenta = intervaloCuenta;
        }

        function detenerSesion() {
            if (!sistemaActivo) return;

            sistemaActivo = false;

            if (window._intervaloMod) clearInterval(window._intervaloMod);
            if (window._intervaloCuenta) clearInterval(window._intervaloCuenta);
            if (intervaloRegistro) clearInterval(intervaloRegistro);

            // Detener audio
            if (oscIzq) {
                oscIzq.stop();
                oscIzq = null;
            }
            if (oscDer) {
                oscDer.stop();
                oscDer = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }

            liberarWakeLock();
            navigator.vibrate(0);

            descargarCSV();

            btnIniciar.innerText = 'INICIAR';
            btnIniciar.classList.remove('activo');
            cuentaAtrasEl.innerText = formatearTiempo(DURACION_SESION);
            alertaDespegue.style.display = 'none';
            indicadorArmonia.style.display = 'none';
            bodyEl.classList.remove('estado-armonico');
            enAlerta = false;
        }

        // ===========================================
        // EVENTO DEL BOTÓN
        // ===========================================
        btnIniciar.addEventListener('click', iniciarSesion);

        // Inicializar sensores pasivamente
        iniciarSensores();
    </script>
</body>
</html>
